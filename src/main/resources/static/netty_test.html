<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Netty 在线监测测试</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #38bdf8;
        }

        input {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            width: 100%;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: scale 0.2s;
        }

        button:hover {
            scale: 1.02;
            background: #7dd3fc;
        }

        #status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
            background: #0f172a;
            font-size: 0.875rem;
            text-align: left;
            overflow-y: auto;
            max-height: 150px;
            border: 1px solid #334155;
        }

        .online {
            color: #4ade80;
        }

        .offline {
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="card" style="width: 700px;">
        <h1>Netty 监控测试工具 (V2.0)</h1>

        <!-- 模拟操作区 -->
        <div
            style="background: #0f172a; padding: 1.5rem; border-radius: 0.75rem; margin-bottom: 2rem; border: 1px solid #334155;">
            <h3 style="margin-top: 0; color: #38bdf8;">模拟上线操作</h3>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="userId" placeholder="输入模拟用户 ID" value="1" style="flex: 1; margin: 0;">
                <button onclick="connect()" style="width: auto;">建立 WebSocket 连接</button>
            </div>
            <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 0.5rem;">提示：建立连接后，Netty 会自动将数据库该用户的 status 改为 1
            </p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <!-- 左侧：数据库实时看板 -->
            <div>
                <h3 style="text-align: left; color: #4ade80;">全局在线看板 (从数据库)</h3>
                <div id="global-sessions"
                    style="display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; background: #0f172a; padding: 1rem; border-radius: 0.5rem; border: 1px solid #1e293b;">
                    <!-- 全局用户列表 -->
                </div>
                <p style="font-size: 0.75rem; color: #64748b; margin-top: 0.5rem;">状态自动刷新: <span id="sync-time">-</span>
                </p>
            </div>

            <!-- 右侧：当前页面连接详情 -->
            <div>
                <h3 style="text-align: left; color: #facc15;">本地连接详情</h3>
                <div id="sessions"
                    style="display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; background: #0f172a; padding: 1rem; border-radius: 0.5rem; border: 1px solid #1e293b;">
                    <!-- 本地连接列表 -->
                </div>
            </div>
        </div>

        <div id="status" style="margin-top: 1.5rem; text-align: left;">日志输出:</div>
    </div>

    <script>
        const activeSessions = new Map(); // id -> socket

        function log(msg, type) {
            const status = document.getElementById('status');
            const div = document.createElement('div');
            if (type) div.className = type;
            div.style.fontSize = "0.75rem";
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            status.after(div);
        }

        // --- 全局在线列表同步 (轮询数据库) ---
        async function fetchGlobalOnlineUsers() {
            try {
                const response = await fetch('/user/online-list');
                const result = await response.json();
                if (result.code === 200) {
                    renderGlobalSessions(result.data);
                    document.getElementById('sync-time').innerText = new Date().toLocaleTimeString();
                }
            } catch (err) {
                console.error("同步全局状态失败", err);
            }
        }

        function renderGlobalSessions(users) {
            const container = document.getElementById('global-sessions');
            container.innerHTML = '';
            if (!users || users.length === 0) {
                container.innerHTML = '<div style="color: #64748b; font-size: 0.8rem;">数据库中暂无在线用户</div>';
                return;
            }
            users.forEach(user => {
                const div = document.createElement('div');
                div.style = "display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; padding: 4px 0;";
                div.innerHTML = `
                    <span style="font-size: 0.85rem;">[${user.id}] <strong>${user.username}</strong></span>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="online" style="font-size: 0.7rem;">● ONLINE</span>
                        <button onclick="forceOffline(${user.id})" style="width: auto; padding: 0.15rem 0.4rem; font-size: 0.65rem; background: #ef4444; color: white;">强行下线</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        /**
         * 强行将该 ID 下线 (通过模拟后端逻辑将 status 置为 0)
         */
        async function forceOffline(userId) {
            if (!confirm(`确定要强行将用户 [${userId}] 下线吗？`)) return;

            log(`正在对用户 [${userId}] 执行强制下线...`);
            try {
                // 升级后端逻辑：我们也需要修改 UserController 以便支持按 ID 下线
                const response = await fetch(`/user/logout?userId=${userId}`, { method: 'POST' });
                const result = await response.json();

                if (result.code === 200) {
                    log(`用户 [${userId}] 强制下线指令已发送`, "online");
                } else {
                    log(`用户 [${userId}] 强制下线操作失败: ${result.msg}`, "offline");
                }

                // 如果本地刚好有这个连接，也顺便关掉它
                if (activeSessions.has(userId.toString())) {
                    activeSessions.get(userId.toString()).close();
                }

                setTimeout(fetchGlobalOnlineUsers, 500);
            } catch (err) {
                log(`强制下线请求异常: ${err.message}`, "offline");
            }
        }

        // --- 本地连接管理 ---
        function renderSessions() {
            const container = document.getElementById('sessions');
            container.innerHTML = '';
            if (activeSessions.size === 0) {
                container.innerHTML = '<div style="color: #64748b; font-size: 0.8rem;">本地暂无活跃连接</div>';
                return;
            }
            activeSessions.forEach((socket, userId) => {
                const div = document.createElement('div');
                div.style = "background: #1e293b; padding: 0.5rem; border-radius: 0.4rem; display: flex; justify-content: space-between; align-items: center;";
                div.innerHTML = `
                    <span style="font-size: 0.85rem;">ID: ${userId}</span>
                    <button onclick="disconnect('${userId}')" style="width: auto; padding: 0.2rem 0.5rem; font-size: 0.7rem; background: #f87171; color: white;">下线</button>
                `;
                container.appendChild(div);
            });
        }

        function connect() {
            const userId = document.getElementById('userId').value;
            if (!userId) return alert("请输入用户 ID");
            if (activeSessions.has(userId)) return alert("该用户已在当前页面建立连接");

            log(`正在尝试建立 WebSocket 连接 (用户 ${userId})...`);
            const socket = new WebSocket("ws://localhost:8888/ws");

            socket.onopen = function () {
                log(`用户 [${userId}] 连接已成功`, "online");
                socket.send(`LOGIN:userId:${userId}`);
                activeSessions.set(userId, socket);
                renderSessions();
                fetchGlobalOnlineUsers(); // 立即同步一次
            };

            socket.onmessage = function (event) {
                if (event.data === "PING") {
                    socket.send("PONG");
                }
            };

            socket.onclose = function () {
                log(`用户 [${userId}] 已断开连接`, "offline");
                activeSessions.delete(userId);
                renderSessions();
                setTimeout(fetchGlobalOnlineUsers, 500); // 延迟同步确保 DB 已更新
            };
        }

        function disconnect(userId) {
            const socket = activeSessions.get(userId);
            if (socket) socket.close();
        }

        // 启动轮询
        setInterval(fetchGlobalOnlineUsers, 3000);
        fetchGlobalOnlineUsers();

    </script>
</body>

</html>
