version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: aishop-postgres
    environment:
      POSTGRES_DB: aishop_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin", "-d", "aishop_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: aishop-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/aishop_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=123456
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
