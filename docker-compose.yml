version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: aishop-postgres
    environment:
      POSTGRES_DB: aishop_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "aishop_user"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
